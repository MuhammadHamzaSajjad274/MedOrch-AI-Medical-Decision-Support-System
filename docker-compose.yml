# Qdrant only - for RAG (Phase 3)
# Optional: add deploy.resources.limits.memory: 1g to avoid contention on 16GB RAM

services:
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    # Uncomment to limit RAM usage on 16GB system:
    # deploy:
    #   resources:
    #     limits:
    #       memory: 1G

volumes:
  qdrant_storage:
